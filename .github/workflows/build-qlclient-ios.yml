name: Build QLClient iOS IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "QLClient/**"
      - "Project.yml"
      - ".github/workflows/build-qlclient-ios.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Prepare build metadata
        shell: bash
        run: |
          set -euo pipefail
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"
          echo "BUILD_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Build unsigned app
        run: |
          set -euo pipefail
          mkdir -p build
          set +e
          xcodebuild \
            -project QLClient.xcodeproj \
            -scheme QLClient \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            MARKETING_VERSION=0.1.2 \
            CURRENT_PROJECT_VERSION="$GITHUB_RUN_NUMBER" \
            QL_BUILD_COMMIT="$SHORT_SHA" \
            QL_BUILD_TIME="$BUILD_TIME" \
            build 2>&1 | tee build/xcodebuild.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            grep -E "error:|warning:" build/xcodebuild.log | tail -n 40 | while IFS= read -r line; do
              echo "::error ::$line"
            done
            exit "$status"
          fi

      - name: Package IPA
        run: |
          set -euo pipefail
          app_path="build/DerivedData/Build/Products/Release-iphoneos/QLClient.app"
          test -d "$app_path"
          rm -rf build/Payload build/QLClient-unsigned.ipa
          mkdir -p build/Payload
          cp -R "$app_path" build/Payload/
          (cd build && zip -qry QLClient-unsigned.ipa Payload)

      - name: Publish unsigned IPA release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          fixed_tag="qlclient-unsigned-${SHORT_SHA}"
          latest_tag="qlclient-unsigned-latest"

          gh release delete "$fixed_tag" --yes --cleanup-tag || true
          git tag -f "$fixed_tag" "$GITHUB_SHA"
          git push --force origin "refs/tags/$fixed_tag"
          gh release create "$fixed_tag" \
            "build/QLClient-unsigned.ipa#QLClient-unsigned.ipa" \
            --title "QLClient unsigned IPA ${SHORT_SHA}" \
            --notes "Unsigned SwiftUI QingLong client built from ${GITHUB_SHA}. Install with TrollStore or sign manually." \
            --latest=false

          gh release delete "$latest_tag" --yes --cleanup-tag || true
          git tag -f "$latest_tag" "$GITHUB_SHA"
          git push --force origin "refs/tags/$latest_tag"
          gh release create "$latest_tag" \
            "build/QLClient-unsigned.ipa#QLClient-unsigned.ipa" \
            --title "QLClient unsigned IPA latest" \
            --notes "Latest unsigned SwiftUI QingLong client. Current build: ${GITHUB_SHA}." \
            --latest=false
